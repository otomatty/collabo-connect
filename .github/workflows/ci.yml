name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    # Least privilege: CI only needs to read the repo to check out and run
    # lint/typecheck/test. No step pushes, comments, or reports statuses.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # Single install for the whole job so setup-bun downloads the runtime once
      # per run (instead of once per job), reducing exposure to transient
      # GitHub-releases 504s on the Bun/CLI download.
      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Run ESLint
        run: bun run lint

      - name: Run TypeScript type check
        run: bun run typecheck

      - name: Run unit tests
        run: bun run test

  api:
    name: API
    runs-on: ubuntu-latest
    # The api/ workspace is a separate npm project (package-lock.json) that the
    # Bun-based `ci` job above does not install or build. This job builds and
    # tests it so dependency bumps under api/ (e.g. Dependabot) are validated.
    permissions:
      contents: read
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build (tsc)
        run: npm run build

      - name: Run unit tests
        run: npm test
