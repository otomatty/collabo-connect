name = "collabo-connect-api"
main = "src/worker.ts"
compatibility_date = "2024-11-27"
# nodejs_compat enables `node:crypto` (createHash / used by Better Auth).
compatibility_flags = ["nodejs_compat"]
workers_dev = true

# ---- D1 (SQLite) ----------------------------------------------------------
# Create with: wrangler d1 create collabo-connect
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "collabo-connect"
database_id = "REPLACE_WITH_D1_DATABASE_ID"
migrations_dir = "migrations"

# ---- Cron trigger (daily question) ---------------------------------------
# Replaces the Railway cron. UTC 15:00 == JST 00:00. Invokes scheduled() in
# src/worker.ts → runGenerateDailyQuestion().
[triggers]
crons = ["0 15 * * *"]

# ---- Non-secret vars ------------------------------------------------------
# Secrets are set out-of-band (never commit them):
#   wrangler secret put BETTER_AUTH_SECRET
#   wrangler secret put GEMINI_API_KEY
#   wrangler secret put CRON_SECRET
#   wrangler secret put RESEND_API_KEY
[vars]
NODE_ENV = "production"
# Public origin of THIS worker (used to build magic-link URLs). Update after the
# first deploy / when attaching a custom domain.
BETTER_AUTH_URL = "https://collabo-connect-api.workers.dev"
# Frontend origins allowed to complete auth / receive the session cookie.
BETTER_AUTH_TRUSTED_ORIGINS = "https://collabo-connect.pages.dev,http://localhost:8080,http://localhost:5173"
# CORS origins (must include the frontend origin in production).
CORS_ORIGINS = "https://collabo-connect.pages.dev,http://localhost:8080,http://localhost:5173"
RESEND_FROM = "onboarding@resend.dev"
