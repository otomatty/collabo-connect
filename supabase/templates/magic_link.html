<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      body { margin: 0; padding: 0; background-color: #FAF5F0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
      .container { max-width: 480px; margin: 40px auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(54,44,38,0.08); }
      .header { background: #D96E26; padding: 32px 24px; text-align: center; }
      .logo { font-size: 32px; margin-bottom: 8px; }
      .app-name { color: #ffffff; font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
      .body { padding: 32px 24px; }
      .greeting { color: #362C26; font-size: 16px; font-weight: 600; margin: 0 0 16px 0; }
      .text { color: #6B5B50; font-size: 14px; line-height: 1.6; margin: 0 0 24px 0; }
      .btn { display: inline-block; background: #D96E26; color: #ffffff !important; text-decoration: none; padding: 12px 32px; border-radius: 10px; font-size: 14px; font-weight: 600; }
      .btn-wrap { text-align: center; margin: 24px 0; }
      .note { color: #9E8E83; font-size: 12px; line-height: 1.5; margin: 24px 0 0 0; }
      .footer { padding: 16px 24px; text-align: center; border-top: 1px solid #EDE6DF; }
      .footer-text { color: #9E8E83; font-size: 11px; margin: 0; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div class="logo">🤝</div>
        <div class="app-name">Collabo Connect</div>
      </div>
      <div class="body">
        <p class="greeting">ログインリンクのお届けです</p>
        <p class="text">
          Collabo Connect へのログインがリクエストされました。<br />
          下のボタンをクリックしてログインしてください。
        </p>
        <div class="btn-wrap">
          <a href="{{ .ConfirmationURL }}" class="btn">ログインする</a>
        </div>
        <p class="note">
          ※ このリンクは1回限り有効です。<br />
          ※ このメールに心当たりがない場合は、無視していただいて問題ありません。
        </p>
      </div>
      <div class="footer">
        <p class="footer-text">© Collabo Connect — 社内コミュニケーション活性化プラットフォーム</p>
      </div>
    </div>
  </body>
</html>
